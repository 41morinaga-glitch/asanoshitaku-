<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFF3E0">
<title>あさのじゅんび</title>
<style>
:root {
  --bg: #FFF8F0; --card: #FFFFFF; --card-border: #FFE0B2; --card-done: #E8F5E9; --card-done-border: #66BB6A;
  --accent: #FF7043; --accent2: #42A5F5; --text: #5D4037; --text-light: #8D6E63; --progress-from: #FFD54F; --progress-to: #66BB6A;
  --radius: 16px; --shadow: 0 4px 16px rgba(0,0,0,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; background: var(--bg); color: var(--text); overscroll-behavior: none; }
body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

/* === Screens === */
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* === Kid Mode === */
#kid-screen { padding: 16px 12px 80px; }
.greeting { text-align: center; margin-bottom: 6px; }
.greeting h1 { font-size: clamp(20px, 5vw, 28px); color: var(--accent); }
.greeting p { font-size: clamp(14px, 3.5vw, 18px); color: var(--text-light); }
.progress-wrap { margin: 10px 0 16px; padding: 0 4px; }
.progress-bar { height: 20px; background: #F5E6D3; border-radius: 10px; overflow: hidden; position: relative; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--progress-from), var(--progress-to)); border-radius: 10px; transition: width 0.6s cubic-bezier(.4,0,.2,1); min-width: 0; }
.progress-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text); }
.item-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
@media (min-width: 600px) { .item-grid { grid-template-columns: repeat(3, 1fr); } }
.item-card { background: var(--card); border: 3px solid var(--card-border); border-radius: var(--radius); padding: 14px 8px; text-align: center; cursor: pointer; transition: transform 0.15s, border-color 0.3s, background 0.3s; user-select: none; position: relative; overflow: hidden; }
.item-card:active { transform: scale(0.94); }
.item-card.done { background: var(--card-done); border-color: var(--card-done-border); }
.item-card .emoji { font-size: clamp(40px, 10vw, 64px); line-height: 1.1; }
.item-card .label { font-size: clamp(13px, 3.2vw, 16px); font-weight: 700; margin-top: 6px; word-break: break-word; }
.item-card .stamp { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 60px; opacity: 0; pointer-events: none; transition: none; }
.item-card.done .stamp { animation: stampIn 0.4s forwards; }
@keyframes stampIn { 0% { transform: translate(-50%,-50%) scale(0) rotate(-30deg); opacity: 0; } 60% { transform: translate(-50%,-50%) scale(1.3) rotate(5deg); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 0.85; } }
.item-card.entering { animation: cardIn 0.4s ease-out both; }
@keyframes cardIn { from { opacity: 0; transform: translateY(20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

.parent-link { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); padding: 10px 24px; background: rgba(0,0,0,0.04); border-radius: 20px; border: none; color: #BCAAA4; font-size: 12px; cursor: pointer; z-index: 10; }
.parent-link:active { background: rgba(0,0,0,0.08); }

/* === PIN Screen === */
#pin-screen { align-items: center; justify-content: center; padding: 20px; background: rgba(93,64,55,0.95); position: fixed; inset: 0; z-index: 200; }
.pin-box { background: #fff; border-radius: 20px; padding: 30px; width: 100%; max-width: 300px; text-align: center; }
.pin-box h2 { color: var(--text); font-size: 18px; margin-bottom: 16px; }
.pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
.pin-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #BCAAA4; background: #fff; transition: background 0.15s; }
.pin-dot.filled { background: var(--accent); border-color: var(--accent); }
.pin-dot.error { background: #e53935; border-color: #e53935; animation: shake 0.3s; }
@keyframes shake { 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
.pin-keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 240px; margin: 0 auto; }
.pin-key { width: 60px; height: 60px; border-radius: 50%; border: none; background: #F5F5F5; color: var(--text); font-size: 24px; font-weight: 700; cursor: pointer; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
.pin-key:active { background: #E0E0E0; }
.pin-key.cancel { font-size: 13px; background: transparent; color: #999; }
.pin-key.del { font-size: 16px; background: transparent; color: #999; }

/* === Parent Mode === */
#parent-screen { padding: 0; min-height: 100vh; background: #FAFAFA; }
.parent-header { display: flex; align-items: center; padding: 12px 16px; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
.parent-header button { background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px 8px; color: var(--text); }
.parent-header h2 { flex: 1; text-align: center; font-size: 16px; color: var(--text); }
.parent-tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 49px; z-index: 9; }
.parent-tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 600; color: #999; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; }
.parent-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.parent-body { padding: 16px; flex: 1; }

/* Parent: Item management */
.manage-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: #fff; border: 1px solid #eee; border-radius: 12px; margin-bottom: 8px; }
.manage-item .m-emoji { font-size: 30px; }
.manage-item .m-label { flex: 1; font-size: 14px; font-weight: 600; }
.manage-item button { width: 36px; height: 36px; border-radius: 8px; border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.manage-item .m-edit { background: #E3F2FD; color: #1976D2; }
.manage-item .m-del { background: #FFEBEE; color: #D32F2F; }
.add-form { background: #fff; border: 2px dashed #ddd; border-radius: 12px; padding: 16px; margin-top: 12px; }
.add-form label { display: block; font-size: 12px; color: #999; margin-bottom: 6px; }
.add-form input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; font-family: inherit; }
.emoji-picker { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; margin: 8px 0; max-height: 160px; overflow-y: auto; }
.emoji-pick { font-size: 24px; background: none; border: 2px solid transparent; border-radius: 8px; cursor: pointer; padding: 4px; text-align: center; }
.emoji-pick.selected { border-color: var(--accent); background: #FFF3E0; }
.btn { padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: #F5F5F5; color: var(--text); margin-top: 8px; }
.btn-danger { background: #FFEBEE; color: #D32F2F; margin-top: 8px; }

/* Parent: History calendar */
.cal-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.cal-nav button { background: #fff; border: 1px solid #ddd; border-radius: 8px; width: 36px; height: 36px; cursor: pointer; font-size: 16px; }
.cal-nav .cal-title { flex: 1; text-align: center; font-size: 15px; font-weight: 700; }
.streak-box { background: linear-gradient(135deg, #FF7043, #FFB74D); color: #fff; border-radius: 12px; padding: 14px; text-align: center; margin-bottom: 14px; font-size: 15px; font-weight: 700; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-dow { text-align: center; font-size: 11px; color: #999; padding: 4px; }
.cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; font-size: 12px; background: #fff; border: 1px solid #eee; }
.cal-day.empty { background: transparent; border: none; }
.cal-day.perfect { background: #C8E6C9; border-color: #66BB6A; }
.cal-day.partial { background: #FFF9C4; border-color: #FFD54F; }
.cal-day.today { outline: 2px solid var(--accent); outline-offset: -2px; }
.cal-day .daynum { font-weight: 700; color: var(--text); }
.cal-day .daycount { font-size: 10px; color: #888; }

/* Parent: Settings */
.setting-group { background: #fff; border-radius: 12px; border: 1px solid #eee; margin-bottom: 12px; overflow: hidden; }
.setting-row { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; display: flex; align-items: center; gap: 10px; }
.setting-row:last-child { border-bottom: none; }
.setting-row label { flex: 1; font-size: 14px; }
.setting-row input[type=text], .setting-row input[type=password] { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 160px; font-family: inherit; }

/* === Celebration === */
#celebration { position: fixed; inset: 0; z-index: 300; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
#celebration.show { display: flex; }
.celeb-box { background: #fff; border-radius: 24px; padding: 30px; text-align: center; max-width: 320px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: celebBounce 0.5s ease-out; }
@keyframes celebBounce { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
.celeb-box .celeb-emoji { font-size: 72px; }
.celeb-box h2 { font-size: 26px; color: var(--accent); margin: 12px 0 8px; }
.celeb-box p { font-size: 14px; color: var(--text-light); }
.confetti { position: fixed; top: -10px; width: 10px; height: 10px; border-radius: 2px; z-index: 301; animation: confettiFall var(--dur) linear forwards; pointer-events: none; }
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<!-- Kid Mode -->
<div class="screen active" id="kid-screen">
  <div class="greeting">
    <h1 id="greetText">🌅 おはよう！</h1>
    <p>きょうの じゅんび</p>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>
  </div>
  <div class="item-grid" id="itemGrid"></div>
  <button class="parent-link" id="parentLink">🔒 おとなモード</button>
</div>

<!-- PIN -->
<div class="screen" id="pin-screen">
  <div class="pin-box">
    <h2>🔑 パスワード</h2>
    <div class="pin-dots" id="pinDots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
    <div class="pin-keys" id="pinKeys"></div>
  </div>
</div>

<!-- Parent Mode -->
<div class="screen" id="parent-screen">
  <div class="parent-header">
    <button id="parentBack">←</button>
    <h2>おとなモード</h2>
    <button style="visibility:hidden;">←</button>
  </div>
  <div class="parent-tabs">
    <button class="parent-tab active" data-tab="manage">もちもの</button>
    <button class="parent-tab" data-tab="history">りれき</button>
    <button class="parent-tab" data-tab="settings">せってい</button>
  </div>
  <div class="parent-body" id="parentBody"></div>
</div>

<!-- Celebration -->
<div id="celebration">
  <div class="celeb-box">
    <div class="celeb-emoji">🎉</div>
    <h2>かんぺき！</h2>
    <p id="celebMsg">すごいね！ぜんぶ じゅんびできたよ！</p>
  </div>
</div>

<script>
(function() {
  const KEYS = {
    items: 'asajunbi_items',
    today: 'asajunbi_today',
    history: 'asajunbi_history',
    pin: 'asajunbi_pin',
    settings: 'asajunbi_settings'
  };

  const DEFAULT_ITEMS = [
    { id: 'i1', emoji: '🎒', label: 'ランドセル', order: 0 },
    { id: 'i2', emoji: '📓', label: 'れんらくちょう', order: 1 },
    { id: 'i3', emoji: '✏️', label: 'ふでばこ', order: 2 },
    { id: 'i4', emoji: '🤧', label: 'ハンカチ・ティッシュ', order: 3 },
    { id: 'i5', emoji: '💧', label: 'すいとう', order: 4 },
    { id: 'i6', emoji: '😷', label: 'マスク', order: 5 },
    { id: 'i7', emoji: '📚', label: 'きょうかしょ', order: 6 },
    { id: 'i8', emoji: '👟', label: 'うわばき', order: 7 },
    { id: 'i9', emoji: '🍱', label: 'きゅうしょくセット', order: 8 },
    { id: 'i10', emoji: '🧢', label: 'ぼうし', order: 9 }
  ];

  const EMOJI_LIST = [
    '🎒','📓','✏️','🤧','💧','😷','📚','👟','🍱','🧢',
    '📐','📏','🖍️','🎨','✂️','📎','📖','🗂️','🎵','🎹',
    '⛳','🏃','🩰','🧤','🧣','☂️','🌂','👕','👖','🧦',
    '🧥','🩲','🩳','👒','🎿','⏰','🪥','🪮','💊','🩹',
    '🧴','🫧','🍙','🥛','🍎','🧃','🥤','🥪','🫙','📝',
    '💻','📱','🔑','🪪','💰','🎾','⚽','🏀','🎭','🧸'
  ];

  const CELEB_MSGS = [
    'すごいね！ぜんぶ じゅんびできたよ！',
    'えらい！きょうも かんぺき！',
    'ばっちり！いってらっしゃい！🌟',
    'さすが！じぶんで じゅんびできたね！✨',
    'すばらしい！きょうも がんばろう！💪'
  ];

  let items = [], today = { date: '', checked: [] }, history = [], pin = '1234', settings = { childName: '' };
  let currentTab = 'manage';
  let calMonth = null;
  let pinBuffer = '';
  let editingId = null;

  function uid() { return 'i' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
  function todayStr() { return new Date().toLocaleDateString('sv-SE'); }

  // Storage
  function load() {
    try { items = JSON.parse(localStorage.getItem(KEYS.items)) || []; } catch(e) { items = []; }
    if (!items.length) items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
    try { today = JSON.parse(localStorage.getItem(KEYS.today)) || { date: '', checked: [] }; } catch(e) { today = { date: '', checked: [] }; }
    try { history = JSON.parse(localStorage.getItem(KEYS.history)) || []; } catch(e) { history = []; }
    try { pin = localStorage.getItem(KEYS.pin) || '1234'; } catch(e) { pin = '1234'; }
    try { settings = JSON.parse(localStorage.getItem(KEYS.settings)) || { childName: '' }; } catch(e) { settings = { childName: '' }; }
  }

  function saveItems() { localStorage.setItem(KEYS.items, JSON.stringify(items)); }
  function saveToday() { localStorage.setItem(KEYS.today, JSON.stringify(today)); }
  function saveHistory() { localStorage.setItem(KEYS.history, JSON.stringify(history)); }
  function savePin() { localStorage.setItem(KEYS.pin, pin); }
  function saveSettings() { localStorage.setItem(KEYS.settings, JSON.stringify(settings)); }

  function dailyReset() {
    const d = todayStr();
    if (today.date && today.date !== d) {
      history.push({ date: today.date, total: items.length, completed: today.checked.length, allDone: today.checked.length >= items.length });
      while (history.length > 90) history.shift();
      saveHistory();
      today = { date: d, checked: [] };
      saveToday();
    } else if (!today.date) {
      today.date = d;
      saveToday();
    }
  }

  // Screens
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('show', 'active');
  }

  // === Kid Mode ===
  function renderKid() {
    // Greeting
    const hour = new Date().getHours();
    const greetEmoji = hour < 10 ? '🌅' : hour < 17 ? '☀️' : '🌙';
    const greetWord = hour < 10 ? 'おはよう' : hour < 17 ? 'こんにちは' : 'こんばんは';
    const name = settings.childName ? settings.childName + 'ちゃん' : '';
    document.getElementById('greetText').textContent = greetEmoji + ' ' + greetWord + '！' + name;

    // Grid
    const grid = document.getElementById('itemGrid');
    grid.innerHTML = '';
    const sorted = [...items].sort((a, b) => a.order - b.order);
    sorted.forEach((item, i) => {
      const done = today.checked.includes(item.id);
      const card = document.createElement('div');
      card.className = 'item-card' + (done ? ' done' : '') + ' entering';
      card.style.animationDelay = (i * 0.05) + 's';
      card.setAttribute('role', 'checkbox');
      card.setAttribute('aria-checked', done);
      card.innerHTML = '<div class="emoji">' + item.emoji + '</div><div class="label">' + item.label + '</div><div class="stamp">✅</div>';
      card.addEventListener('click', () => toggleItem(item.id));
      grid.appendChild(card);
    });

    updateProgress();
  }

  function updateProgress() {
    const total = items.length;
    const done = today.checked.filter(id => items.some(it => it.id === id)).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = done + ' / ' + total;
  }

  function toggleItem(id) {
    const idx = today.checked.indexOf(id);
    if (idx >= 0) { today.checked.splice(idx, 1); }
    else { today.checked.push(id); playCheckSound(); }
    saveToday();
    renderKid();
    if (today.checked.length >= items.length && items.length > 0) {
      setTimeout(showCelebration, 400);
    }
  }

  function playCheckSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
      osc.start(); osc.stop(ctx.currentTime + 0.2);
    } catch(e) {}
  }

  function showCelebration() {
    const cel = document.getElementById('celebration');
    document.getElementById('celebMsg').textContent = CELEB_MSGS[Math.floor(Math.random() * CELEB_MSGS.length)];
    cel.classList.add('show');
    spawnConfetti();
    playCelebSound();
    setTimeout(() => cel.classList.remove('show'), 4500);
    cel.addEventListener('click', () => cel.classList.remove('show'), { once: true });
  }

  function spawnConfetti() {
    const colors = ['#FF7043','#42A5F5','#FFD54F','#66BB6A','#AB47BC','#FF80AB','#4DD0E1'];
    for (let i = 0; i < 50; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.setProperty('--dur', (2 + Math.random() * 2) + 's');
      c.style.width = (6 + Math.random() * 8) + 'px';
      c.style.height = (6 + Math.random() * 8) + 'px';
      c.style.animationDelay = (Math.random() * 0.8) + 's';
      document.body.appendChild(c);
      c.addEventListener('animationend', () => c.remove());
    }
  }

  function playCelebSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [523, 659, 784, 1047].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.4);
        osc.start(ctx.currentTime + i * 0.15);
        osc.stop(ctx.currentTime + i * 0.15 + 0.4);
      });
    } catch(e) {}
  }

  // === PIN ===
  function showPin(callback) {
    pinBuffer = '';
    showScreen('pin-screen');
    updatePinDots();
    const keys = document.getElementById('pinKeys');
    keys.innerHTML = '';
    [1,2,3,4,5,6,7,8,9].forEach(n => {
      const b = document.createElement('button');
      b.className = 'pin-key';
      b.textContent = n;
      b.addEventListener('click', () => pinInput(String(n), callback));
      keys.appendChild(b);
    });
    const cancel = document.createElement('button');
    cancel.className = 'pin-key cancel';
    cancel.textContent = 'もどる';
    cancel.addEventListener('click', () => { showScreen('kid-screen'); });
    keys.appendChild(cancel);
    const zero = document.createElement('button');
    zero.className = 'pin-key';
    zero.textContent = '0';
    zero.addEventListener('click', () => pinInput('0', callback));
    keys.appendChild(zero);
    const del = document.createElement('button');
    del.className = 'pin-key del';
    del.textContent = '⌫';
    del.addEventListener('click', () => { pinBuffer = pinBuffer.slice(0, -1); updatePinDots(); });
    keys.appendChild(del);
  }

  function pinInput(digit, callback) {
    if (pinBuffer.length >= 4) return;
    pinBuffer += digit;
    updatePinDots();
    if (pinBuffer.length === 4) {
      if (pinBuffer === pin) {
        callback();
      } else {
        document.querySelectorAll('#pinDots .pin-dot').forEach(d => d.classList.add('error'));
        setTimeout(() => { pinBuffer = ''; updatePinDots(); document.querySelectorAll('#pinDots .pin-dot').forEach(d => d.classList.remove('error')); }, 500);
      }
    }
  }

  function updatePinDots() {
    document.querySelectorAll('#pinDots .pin-dot').forEach((d, i) => {
      d.classList.toggle('filled', i < pinBuffer.length);
    });
  }

  // === Parent Mode ===
  function showParent() {
    showScreen('parent-screen');
    renderParentTab();
  }

  function renderParentTab() {
    document.querySelectorAll('.parent-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === currentTab));
    const body = document.getElementById('parentBody');
    body.innerHTML = '';
    if (currentTab === 'manage') renderManage(body);
    else if (currentTab === 'history') renderHistory(body);
    else if (currentTab === 'settings') renderSettings(body);
  }

  // Manage tab
  function renderManage(body) {
    editingId = null;
    const sorted = [...items].sort((a, b) => a.order - b.order);
    sorted.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'manage-item';
      row.innerHTML = '<span class="m-emoji">' + item.emoji + '</span><span class="m-label">' + item.label + '</span>';
      // Up/down
      if (i > 0) {
        const up = document.createElement('button');
        up.style.cssText = 'background:#F3E5F5;color:#7B1FA2;'; up.textContent = '↑';
        up.addEventListener('click', () => { swapOrder(item.id, sorted[i-1].id); renderParentTab(); });
        row.appendChild(up);
      }
      if (i < sorted.length - 1) {
        const down = document.createElement('button');
        down.style.cssText = 'background:#F3E5F5;color:#7B1FA2;'; down.textContent = '↓';
        down.addEventListener('click', () => { swapOrder(item.id, sorted[i+1].id); renderParentTab(); });
        row.appendChild(down);
      }
      const editBtn = document.createElement('button');
      editBtn.className = 'm-edit'; editBtn.textContent = '✏️';
      editBtn.addEventListener('click', () => { editingId = item.id; renderParentTab(); });
      const delBtn = document.createElement('button');
      delBtn.className = 'm-del'; delBtn.textContent = '🗑';
      delBtn.addEventListener('click', () => {
        if (!confirm('「' + item.label + '」をけしますか？')) return;
        items = items.filter(x => x.id !== item.id);
        today.checked = today.checked.filter(id => id !== item.id);
        saveItems(); saveToday();
        renderParentTab(); renderKid();
      });
      row.appendChild(editBtn); row.appendChild(delBtn);
      body.appendChild(row);
    });

    // Edit form
    if (editingId) {
      const target = items.find(x => x.id === editingId);
      if (target) renderItemForm(body, target);
    }

    // Add button/form
    const addBtn = document.createElement('button');
    addBtn.className = 'btn btn-primary';
    addBtn.style.marginTop = '12px';
    addBtn.textContent = '＋ あたらしく ついか';
    addBtn.addEventListener('click', () => { editingId = '__new__'; renderParentTab(); });
    if (editingId === '__new__') {
      renderItemForm(body, null);
    } else {
      body.appendChild(addBtn);
    }
  }

  function renderItemForm(body, existing) {
    const form = document.createElement('div');
    form.className = 'add-form';
    form.innerHTML = '<label>アイコンをえらぶ</label>';
    const picker = document.createElement('div');
    picker.className = 'emoji-picker';
    let selectedEmoji = existing ? existing.emoji : '📦';
    EMOJI_LIST.forEach(e => {
      const b = document.createElement('button');
      b.className = 'emoji-pick' + (e === selectedEmoji ? ' selected' : '');
      b.textContent = e;
      b.addEventListener('click', () => { selectedEmoji = e; picker.querySelectorAll('.emoji-pick').forEach(p => p.classList.toggle('selected', p.textContent === e)); });
      picker.appendChild(b);
    });
    form.appendChild(picker);
    const lbl = document.createElement('label');
    lbl.textContent = 'なまえ';
    form.appendChild(lbl);
    const inp = document.createElement('input');
    inp.type = 'text'; inp.value = existing ? existing.label : ''; inp.placeholder = 'もちものの なまえ';
    form.appendChild(inp);
    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-primary';
    saveBtn.style.marginTop = '12px';
    saveBtn.textContent = existing ? 'ほぞん' : 'ついか';
    saveBtn.addEventListener('click', () => {
      const label = inp.value.trim();
      if (!label) { alert('なまえを いれてください'); return; }
      if (existing) {
        existing.emoji = selectedEmoji;
        existing.label = label;
      } else {
        const maxOrder = items.reduce((m, x) => Math.max(m, x.order), -1);
        items.push({ id: uid(), emoji: selectedEmoji, label, order: maxOrder + 1 });
      }
      editingId = null;
      saveItems();
      renderParentTab(); renderKid();
    });
    form.appendChild(saveBtn);
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn btn-secondary';
    cancelBtn.textContent = 'キャンセル';
    cancelBtn.addEventListener('click', () => { editingId = null; renderParentTab(); });
    form.appendChild(cancelBtn);
    body.appendChild(form);
  }

  function swapOrder(id1, id2) {
    const a = items.find(x => x.id === id1);
    const b = items.find(x => x.id === id2);
    if (a && b) { const tmp = a.order; a.order = b.order; b.order = tmp; saveItems(); }
  }

  // History tab
  function renderHistory(body) {
    if (!calMonth) { const t = new Date(); calMonth = new Date(t.getFullYear(), t.getMonth(), 1); }
    // Streak
    const streak = calcStreak();
    if (streak > 0) {
      const sb = document.createElement('div');
      sb.className = 'streak-box';
      sb.textContent = '🔥 れんぞく ' + streak + 'にち かんぺき！';
      body.appendChild(sb);
    }
    // Calendar nav
    const nav = document.createElement('div');
    nav.className = 'cal-nav';
    nav.innerHTML = '<button id="hPrev">◀</button><div class="cal-title">' + calMonth.getFullYear() + 'ねん ' + (calMonth.getMonth()+1) + 'がつ</div><button id="hNext">▶</button>';
    body.appendChild(nav);
    // Calendar grid
    const grid = document.createElement('div');
    grid.className = 'cal-grid';
    ['日','月','火','水','木','金','土'].forEach(d => {
      const c = document.createElement('div'); c.className = 'cal-dow'; c.textContent = d; grid.appendChild(c);
    });
    const first = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1);
    const daysIn = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 0).getDate();
    const offset = first.getDay();
    const todayKey = todayStr();
    for (let i = 0; i < offset; i++) { const e = document.createElement('div'); e.className = 'cal-day empty'; grid.appendChild(e); }
    for (let d = 1; d <= daysIn; d++) {
      const cell = document.createElement('div');
      cell.className = 'cal-day';
      const dateStr = calMonth.getFullYear() + '-' + String(calMonth.getMonth()+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      if (dateStr === todayKey) cell.classList.add('today');
      const rec = dateStr === today.date ? { total: items.length, completed: today.checked.length, allDone: today.checked.length >= items.length } : history.find(h => h.date === dateStr);
      if (rec) {
        cell.classList.add(rec.allDone ? 'perfect' : (rec.completed > 0 ? 'partial' : ''));
      }
      cell.innerHTML = '<span class="daynum">' + d + '</span>' + (rec ? '<span class="daycount">' + rec.completed + '/' + rec.total + '</span>' : '');
      grid.appendChild(cell);
    }
    body.appendChild(grid);
    // Stats
    const stats = document.createElement('div');
    stats.style.cssText = 'margin-top:14px;background:#fff;border-radius:12px;border:1px solid #eee;padding:14px;';
    const recent7 = getRecentDays(7);
    const recent30 = getRecentDays(30);
    stats.innerHTML = '<div style="font-size:13px;color:#999;margin-bottom:8px;">📊 たっせいりつ</div>' +
      '<div style="display:flex;gap:12px;">' +
      '<div style="flex:1;text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--accent);">' + Math.round(recent7.rate) + '%</div><div style="font-size:11px;color:#999;">7にち</div></div>' +
      '<div style="flex:1;text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--accent2);">' + Math.round(recent30.rate) + '%</div><div style="font-size:11px;color:#999;">30にち</div></div>' +
      '</div>';
    body.appendChild(stats);
    // Nav events
    document.getElementById('hPrev').addEventListener('click', () => { calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()-1, 1); renderParentTab(); });
    document.getElementById('hNext').addEventListener('click', () => { calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 1); renderParentTab(); });
  }

  function calcStreak() {
    let streak = 0;
    const d = new Date();
    if (today.checked.length >= items.length && items.length > 0) {
      streak++;
      d.setDate(d.getDate() - 1);
    }
    while (true) {
      const ds = d.toLocaleDateString('sv-SE');
      const rec = history.find(h => h.date === ds);
      if (rec && rec.allDone) { streak++; d.setDate(d.getDate() - 1); }
      else break;
    }
    return streak;
  }

  function getRecentDays(n) {
    let perfect = 0, total = 0;
    const d = new Date();
    for (let i = 0; i < n; i++) {
      const ds = d.toLocaleDateString('sv-SE');
      const rec = ds === today.date ? { allDone: today.checked.length >= items.length && items.length > 0 } : history.find(h => h.date === ds);
      if (rec) { total++; if (rec.allDone) perfect++; }
      d.setDate(d.getDate() - 1);
    }
    return { rate: total ? (perfect / total * 100) : 0 };
  }

  // Settings tab
  function renderSettings(body) {
    body.innerHTML = `
    <div class="setting-group">
      <div class="setting-row"><label>👧 おなまえ</label><input type="text" id="sName" value="${settings.childName}" placeholder="おなまえ"></div>
    </div>
    <div class="setting-group">
      <div class="setting-row"><label>🔑 パスワード (4けた)</label><input type="password" id="sPin" maxlength="4" inputmode="numeric" value="${pin}" placeholder="1234"></div>
    </div>
    <button class="btn btn-primary" id="sSave">ほぞん</button>
    <button class="btn btn-danger" id="sReset">すべてのデータをリセット</button>
    `;
    document.getElementById('sSave').addEventListener('click', () => {
      settings.childName = document.getElementById('sName').value.trim();
      const newPin = document.getElementById('sPin').value.trim();
      if (newPin.length === 4 && /^\d{4}$/.test(newPin)) pin = newPin;
      else if (newPin.length > 0) { alert('パスワードは すうじ4けたで いれてください'); return; }
      saveSettings(); savePin();
      alert('ほぞんしました！');
      renderKid();
    });
    document.getElementById('sReset').addEventListener('click', () => {
      if (!confirm('ぜんぶのデータを けしますか？')) return;
      if (!confirm('ほんとうに いいですか？')) return;
      Object.values(KEYS).forEach(k => localStorage.removeItem(k));
      location.reload();
    });
  }

  // === Event Bindings ===
  document.getElementById('parentLink').addEventListener('click', () => showPin(showParent));
  document.getElementById('parentBack').addEventListener('click', () => { showScreen('kid-screen'); renderKid(); });
  document.querySelectorAll('.parent-tab').forEach(t => {
    t.addEventListener('click', () => { currentTab = t.dataset.tab; renderParentTab(); });
  });

  // === Init ===
  load();
  dailyReset();
  renderKid();
})();
</script>
</body>
</html>
