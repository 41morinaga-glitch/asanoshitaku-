<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFF3E0">
<title>あさのじゅんび</title>
<style>
:root {
  --bg: #FFF8F0; --card: #FFFFFF; --card-border: #FFE0B2; --card-done: #E8F5E9; --card-done-border: #66BB6A;
  --accent: #FF7043; --accent2: #42A5F5; --text: #5D4037; --text-light: #8D6E63; --progress-from: #FFD54F; --progress-to: #66BB6A;
  --radius: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; background: var(--bg); color: var(--text); overscroll-behavior: none; }
body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

#kid-screen { padding: 16px 12px 80px; }
.greeting { text-align: center; margin-bottom: 6px; }
.greeting h1 { font-size: clamp(20px, 5vw, 28px); color: var(--accent); }
.greeting p { font-size: clamp(13px, 3.2vw, 17px); color: var(--text-light); }
.progress-wrap { margin: 10px 0 16px; padding: 0 4px; }
.progress-bar { height: 20px; background: #F5E6D3; border-radius: 10px; overflow: hidden; position: relative; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--progress-from), var(--progress-to)); border-radius: 10px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
.progress-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text); }
.item-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
@media (min-width: 600px) { .item-grid { grid-template-columns: repeat(3, 1fr); } }
.item-card { background: var(--card); border: 3px solid var(--card-border); border-radius: var(--radius); padding: 14px 8px 10px; text-align: center; cursor: pointer; transition: transform 0.15s, border-color 0.3s, background 0.3s; user-select: none; position: relative; overflow: hidden; }
.item-card:active { transform: scale(0.94); }
.item-card.done { background: var(--card-done); border-color: var(--card-done-border); }
.item-card .emoji { font-size: clamp(40px, 10vw, 64px); line-height: 1.1; }
.item-card .photo { width: clamp(50px, 14vw, 80px); height: clamp(50px, 14vw, 80px); object-fit: cover; border-radius: 12px; }
.item-card .label { font-size: clamp(13px, 3.2vw, 16px); font-weight: 700; margin-top: 6px; word-break: break-word; }
.item-card .stamp { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: clamp(13px, 3.2vw, 17px); font-weight: 900; color: #fff; background: #66BB6A; padding: 6px 14px; border-radius: 20px; white-space: nowrap; opacity: 0; pointer-events: none; box-shadow: 0 2px 8px rgba(102,187,106,0.4); }
.item-card.done .stamp { animation: stampIn 0.4s forwards; }
@keyframes stampIn { 0% { transform: translate(-50%,-50%) scale(0) rotate(-10deg); opacity: 0; } 60% { transform: translate(-50%,-50%) scale(1.2) rotate(2deg); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(1) rotate(0); opacity: 1; } }
.item-card.entering { animation: cardIn 0.4s ease-out both; }
@keyframes cardIn { from { opacity: 0; transform: translateY(20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

.parent-link { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); padding: 10px 24px; background: rgba(0,0,0,0.04); border-radius: 20px; border: none; color: #BCAAA4; font-size: 12px; cursor: pointer; z-index: 10; }

#pin-screen { align-items: center; justify-content: center; padding: 20px; background: rgba(93,64,55,0.95); position: fixed; inset: 0; z-index: 200; }
.pin-box { background: #fff; border-radius: 20px; padding: 30px; width: 100%; max-width: 300px; text-align: center; }
.pin-box h2 { color: var(--text); font-size: 18px; margin-bottom: 16px; }
.pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
.pin-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #BCAAA4; background: #fff; transition: background 0.15s; }
.pin-dot.filled { background: var(--accent); border-color: var(--accent); }
.pin-dot.error { background: #e53935; border-color: #e53935; animation: shake 0.3s; }
@keyframes shake { 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
.pin-keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 240px; margin: 0 auto; }
.pin-key { width: 60px; height: 60px; border-radius: 50%; border: none; background: #F5F5F5; color: var(--text); font-size: 24px; font-weight: 700; cursor: pointer; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
.pin-key:active { background: #E0E0E0; }
.pin-key.cancel { font-size: 13px; background: transparent; color: #999; }
.pin-key.del { font-size: 16px; background: transparent; color: #999; }

#parent-screen { padding: 0; min-height: 100vh; background: #FAFAFA; }
.parent-header { display: flex; align-items: center; padding: 12px 16px; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
.parent-header button { background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px 8px; color: var(--text); }
.parent-header h2 { flex: 1; text-align: center; font-size: 16px; color: var(--text); }
.parent-tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 49px; z-index: 9; }
.parent-tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 600; color: #999; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; }
.parent-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.parent-body { padding: 16px; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 40px; }

.manage-item { display: flex; align-items: center; gap: 8px; padding: 10px; background: #fff; border: 1px solid #eee; border-radius: 12px; margin-bottom: 8px; }
.manage-item .m-icon { font-size: 28px; flex-shrink: 0; }
.manage-item .m-photo { width: 36px; height: 36px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
.manage-item .m-label { flex: 1; font-size: 13px; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.manage-item .m-days { font-size: 10px; color: #999; }
.manage-item button { width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.manage-item .m-edit { background: #E3F2FD; color: #1976D2; }
.manage-item .m-del { background: #FFEBEE; color: #D32F2F; }
.manage-item .m-up { background: #F3E5F5; color: #7B1FA2; }
.manage-item .m-down { background: #F3E5F5; color: #7B1FA2; }

.add-form { background: #fff; border: 2px dashed #ddd; border-radius: 12px; padding: 16px; margin-top: 12px; }
.add-form label { display: block; font-size: 12px; color: #999; margin: 10px 0 6px; }
.add-form label:first-child { margin-top: 0; }
.add-form input[type=text] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; font-family: inherit; }
.emoji-picker { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; max-height: 140px; overflow-y: auto; }
.emoji-pick { font-size: 22px; background: none; border: 2px solid transparent; border-radius: 8px; cursor: pointer; padding: 4px; text-align: center; }
.emoji-pick.selected { border-color: var(--accent); background: #FFF3E0; }
.photo-upload { display: flex; align-items: center; gap: 10px; }
.photo-upload .preview { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; border: 1px solid #ddd; display: none; }
.photo-upload button { padding: 10px 16px; background: #E3F2FD; border: none; border-radius: 8px; font-size: 13px; color: #1976D2; cursor: pointer; }
.day-picker { display: flex; gap: 4px; flex-wrap: wrap; }
.day-pick { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #ddd; background: #fff; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.day-pick.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn { padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: #F5F5F5; color: var(--text); }
.btn-danger { background: #FFEBEE; color: #D32F2F; }

.cal-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.cal-nav button { background: #fff; border: 1px solid #ddd; border-radius: 8px; width: 36px; height: 36px; cursor: pointer; font-size: 16px; }
.cal-nav .cal-title { flex: 1; text-align: center; font-size: 15px; font-weight: 700; }
.streak-box { background: linear-gradient(135deg, #FF7043, #FFB74D); color: #fff; border-radius: 12px; padding: 14px; text-align: center; margin-bottom: 14px; font-size: 15px; font-weight: 700; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-dow { text-align: center; font-size: 11px; color: #999; padding: 4px; }
.cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; font-size: 12px; background: #fff; border: 1px solid #eee; }
.cal-day.empty { background: transparent; border: none; }
.cal-day.perfect { background: #C8E6C9; border-color: #66BB6A; }
.cal-day.partial { background: #FFF9C4; border-color: #FFD54F; }
.cal-day.today { outline: 2px solid var(--accent); outline-offset: -2px; }
.cal-day .daynum { font-weight: 700; color: var(--text); }
.cal-day .daycount { font-size: 10px; color: #888; }

.setting-group { background: #fff; border-radius: 12px; border: 1px solid #eee; margin-bottom: 12px; overflow: hidden; }
.setting-row { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; display: flex; align-items: center; gap: 10px; }
.setting-row:last-child { border-bottom: none; }
.setting-row label { flex: 1; font-size: 14px; }
.setting-row input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 160px; font-family: inherit; }

#celebration { position: fixed; inset: 0; z-index: 300; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
#celebration.show { display: flex; }
.celeb-box { background: #fff; border-radius: 24px; padding: 30px; text-align: center; max-width: 320px; width: 90%; animation: celebBounce 0.5s ease-out; }
@keyframes celebBounce { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
.celeb-box .celeb-emoji { font-size: 72px; }
.celeb-box h2 { font-size: 26px; color: var(--accent); margin: 12px 0 8px; }
.celeb-box p { font-size: 14px; color: var(--text-light); }
.confetti { position: fixed; top: -10px; width: 10px; height: 10px; border-radius: 2px; z-index: 301; animation: confettiFall var(--dur) linear forwards; pointer-events: none; }
@keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>

<div class="screen active" id="kid-screen">
  <div class="greeting">
    <h1 id="greetText">🌅 おはよう！</h1>
    <p id="dateWeather">よみこみちゅう...</p>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>
  </div>
  <div class="item-grid" id="itemGrid"></div>
  <button class="parent-link" id="parentLink">🔒 おとなモード</button>
</div>

<div class="screen" id="pin-screen">
  <div class="pin-box">
    <h2>🔑 パスワード</h2>
    <div class="pin-dots" id="pinDots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
    <div class="pin-keys" id="pinKeys"></div>
  </div>
</div>

<div class="screen" id="parent-screen">
  <div class="parent-header">
    <button id="parentBack">←</button>
    <h2>おとなモード</h2>
    <button style="visibility:hidden;">←</button>
  </div>
  <div class="parent-tabs">
    <button class="parent-tab active" data-tab="manage">もちもの</button>
    <button class="parent-tab" data-tab="history">りれき</button>
    <button class="parent-tab" data-tab="settings">せってい</button>
  </div>
  <div class="parent-body" id="parentBody"></div>
</div>

<div id="celebration">
  <div class="celeb-box">
    <div class="celeb-emoji">🎉</div>
    <h2>かんぺき！</h2>
    <p id="celebMsg">すごいね！</p>
  </div>
</div>

<script>
(function() {
  const KEYS = { items:'asajunbi_items2', today:'asajunbi_today', history:'asajunbi_history', pin:'asajunbi_pin', settings:'asajunbi_settings' };
  const DOW_NAMES = ['日','月','火','水','木','金','土'];
  const ALL_DAYS = [0,1,2,3,4,5,6];
  const DEFAULT_ITEMS = [
    { id:'i1', emoji:'🎒', label:'ランドセル', order:0, days:[1,2,3,4,5] },
    { id:'i2', emoji:'📓', label:'れんらくちょう', order:1, days:[1,2,3,4,5] },
    { id:'i3', emoji:'✏️', label:'ふでばこ', order:2, days:[1,2,3,4,5] },
    { id:'i4', emoji:'🤧', label:'ハンカチ・ティッシュ', order:3, days:[0,1,2,3,4,5,6] },
    { id:'i5', emoji:'💧', label:'すいとう', order:4, days:[0,1,2,3,4,5,6] },
    { id:'i6', emoji:'😷', label:'マスク', order:5, days:[1,2,3,4,5] },
    { id:'i7', emoji:'📚', label:'きょうかしょ', order:6, days:[1,2,3,4,5] },
    { id:'i8', emoji:'👟', label:'うわばき', order:7, days:[1] },
    { id:'i9', emoji:'🍱', label:'きゅうしょくセット', order:8, days:[1,2,3,4,5] },
    { id:'i10', emoji:'🧢', label:'ぼうし', order:9, days:[1,2,3,4,5] }
  ];
  const EMOJI_LIST = [
    '🎒','📓','✏️','🤧','💧','😷','📚','👟','🍱','🧢','📐','📏','🖍️','🎨','✂️','📎','📖','🗂️','🎵','🎹',
    '⛳','🏃','🩰','🧤','🧣','☂️','🌂','👕','👖','🧦','🧥','👒','⏰','🪥','💊','🩹','🧴','🍙','🥛','🍎',
    '🧃','🥤','🥪','📝','💻','📱','🔑','💰','🎾','⚽','🏀','🧸','📷','🩲','🩳','🎿','🪮','🫧','🫙','📦'
  ];
  const CELEB_MSGS = ['すごいね！ぜんぶ じゅんびできたよ！','えらい！きょうも かんぺき！','ばっちり！いってらっしゃい！🌟','さすが！じぶんで できたね！✨','すばらしい！がんばったね！💪'];
  const VOICE_MSGS = [
    '{name}、じゅんびできたね！', '{name}、ばっちりだよ！', '{name}、OK！いいかんじ！',
    '{name}もできたね、えらい！', 'よし！{name}、かんりょう！', '{name}、じょうずにできたね！',
    '{name}、できたね！すごーい！', '{name}、がんばったね！', '{name}もオッケー！', 'やったね！{name}！'
  ];

  let items=[], today={date:'',checked:[]}, history=[], pin='1234', settings={childName:''};
  let currentTab='manage', calMonth=null, pinBuffer='', editingId=null;

  function uid() { return 'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
  function todayStr() { return new Date().toLocaleDateString('sv-SE'); }
  function todayDow() { return new Date().getDay(); }

  function todayItems() {
    const dow = todayDow();
    return items.filter(it => { const d = it.days || ALL_DAYS; return d.includes(dow); }).sort((a,b) => a.order - b.order);
  }

  function load() {
    try { items = JSON.parse(localStorage.getItem(KEYS.items)) || []; } catch(e) { items=[]; }
    if (!items.length) items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
    items.forEach(it => { if (!it.days) it.days = ALL_DAYS.slice(); });
    try { today = JSON.parse(localStorage.getItem(KEYS.today)) || {date:'',checked:[]}; } catch(e) { today={date:'',checked:[]}; }
    try { history = JSON.parse(localStorage.getItem(KEYS.history)) || []; } catch(e) { history=[]; }
    try { pin = localStorage.getItem(KEYS.pin) || '1234'; } catch(e) { pin='1234'; }
    try { settings = JSON.parse(localStorage.getItem(KEYS.settings)) || {childName:''}; } catch(e) { settings={childName:''}; }
  }
  function saveItems() { localStorage.setItem(KEYS.items, JSON.stringify(items)); }
  function saveToday() { localStorage.setItem(KEYS.today, JSON.stringify(today)); }
  function saveHistory() { localStorage.setItem(KEYS.history, JSON.stringify(history)); }
  function savePin() { localStorage.setItem(KEYS.pin, pin); }
  function saveSettings() { localStorage.setItem(KEYS.settings, JSON.stringify(settings)); }

  function dailyReset() {
    const d = todayStr();
    if (today.date && today.date !== d) {
      const ti = todayItems();
      history.push({ date:today.date, total:ti.length||items.length, completed:today.checked.length, allDone:today.checked.length>= (ti.length||items.length) });
      while (history.length > 90) history.shift();
      saveHistory();
      today = {date:d, checked:[]};
      saveToday();
    } else if (!today.date) { today.date=d; saveToday(); }
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('show','active');
  }

  // === Voice ===
  let jaVoice = null;
  function pickJaVoice() {
    if (!('speechSynthesis' in window)) return null;
    const voices = window.speechSynthesis.getVoices();
    const ja = voices.filter(v => /^ja/i.test(v.lang));
    if (!ja.length) return null;
    const prefer = [/Kyoko/i, /O-Ren/i, /Siri.*Female/i, /Haruka/i, /Enhanced/i, /Google.*日本語/i, /Nanami/i, /Ayumi/i];
    for (const re of prefer) { const h = ja.find(v => re.test(v.name)); if (h) return h; }
    return ja[0];
  }
  if ('speechSynthesis' in window) {
    jaVoice = pickJaVoice();
    window.speechSynthesis.addEventListener('voiceschanged', () => { jaVoice = pickJaVoice(); });
  }
  function speakJa(text) {
    if (!('speechSynthesis' in window)) return;
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      if (!jaVoice) jaVoice = pickJaVoice();
      if (jaVoice) { u.voice = jaVoice; u.lang = jaVoice.lang; } else u.lang = 'ja-JP';
      u.rate = 1.05; u.pitch = 1.15;
      window.speechSynthesis.speak(u);
    } catch(e) {}
  }

  // === Weather ===
  const WMO_E = {0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',71:'🌨',73:'🌨',75:'❄️',80:'🌦',81:'🌧',82:'⛈',95:'⛈'};
  const WMO_T = {0:'はれ',1:'はれ',2:'くもり',3:'くもり',45:'きり',51:'こさめ',53:'あめ',55:'あめ',61:'あめ',63:'あめ',65:'おおあめ',71:'ゆき',73:'ゆき',75:'おおゆき',80:'にわかあめ',82:'おおあめ',95:'かみなり'};
  let weatherCache = null;
  async function fetchWeather() {
    if (weatherCache && Date.now()-weatherCache.ts < 30*60*1000) return weatherCache;
    try {
      let lat=35.68, lon=139.77;
      try { const p = await new Promise((ok,ng)=>navigator.geolocation.getCurrentPosition(ok,ng,{timeout:5000})); lat=p.coords.latitude; lon=p.coords.longitude; } catch(e){}
      const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,weather_code&timezone=Asia%2FTokyo');
      if (!r.ok) return null;
      const d = await r.json();
      weatherCache = { emoji:WMO_E[d.current.weather_code]||'🌈', text:WMO_T[d.current.weather_code]||'', temp:Math.round(d.current.temperature_2m), ts:Date.now() };
      return weatherCache;
    } catch(e) { return null; }
  }
  function renderDateWeather(w) {
    const d = new Date();
    const dow = DOW_NAMES[d.getDay()];
    const el = document.getElementById('dateWeather');
    let t = (d.getMonth()+1)+'がつ '+d.getDate()+'にち '+dow+'ようび';
    if (w) t += '　'+w.emoji+' '+w.temp+'℃ '+w.text;
    el.textContent = t;
  }

  // === Kid Mode ===
  function renderKid() {
    const hour = new Date().getHours();
    const ge = hour<10?'🌅':hour<17?'☀️':'🌙';
    const gw = hour<10?'おはよう':hour<17?'こんにちは':'こんばんは';
    const nm = settings.childName ? settings.childName+'ちゃん' : '';
    document.getElementById('greetText').textContent = ge+' '+gw+'！'+nm;
    const active = todayItems();
    const grid = document.getElementById('itemGrid');
    grid.innerHTML = '';
    active.forEach((item,i) => {
      const done = today.checked.includes(item.id);
      const card = document.createElement('div');
      card.className = 'item-card'+(done?' done':'')+' entering';
      card.style.animationDelay = (i*0.05)+'s';
      let iconHtml;
      if (item.photo) iconHtml = '<img class="photo" src="'+item.photo+'">';
      else iconHtml = '<div class="emoji">'+item.emoji+'</div>';
      card.innerHTML = iconHtml+'<div class="label">'+item.label+'</div><div class="stamp">じゅんびOK！</div>';
      card.addEventListener('click', () => toggleItem(item.id));
      grid.appendChild(card);
    });
    const total = active.length;
    const done = today.checked.filter(id => active.some(it=>it.id===id)).length;
    const pct = total ? Math.round(done/total*100) : 0;
    document.getElementById('progressFill').style.width = pct+'%';
    document.getElementById('progressText').textContent = done+' / '+total;
  }

  function toggleItem(id) {
    const idx = today.checked.indexOf(id);
    if (idx >= 0) { today.checked.splice(idx,1); }
    else {
      today.checked.push(id);
      const item = items.find(x=>x.id===id);
      const tmpl = VOICE_MSGS[Math.floor(Math.random()*VOICE_MSGS.length)];
      speakJa(tmpl.replace('{name}', item ? item.label : ''));
    }
    saveToday(); renderKid();
    const active = todayItems();
    const doneCount = today.checked.filter(id => active.some(it=>it.id===id)).length;
    if (doneCount >= active.length && active.length > 0) setTimeout(showCelebration, 400);
  }

  function showCelebration() {
    const cel = document.getElementById('celebration');
    document.getElementById('celebMsg').textContent = CELEB_MSGS[Math.floor(Math.random()*CELEB_MSGS.length)];
    cel.classList.add('show');
    spawnConfetti(); playCelebSound();
    speakJa('やったー！ぜんぶじゅんびできたよ！かんぺき！');
    setTimeout(()=>cel.classList.remove('show'), 4500);
    cel.addEventListener('click', ()=>cel.classList.remove('show'), {once:true});
  }
  function spawnConfetti() {
    const colors=['#FF7043','#42A5F5','#FFD54F','#66BB6A','#AB47BC','#FF80AB','#4DD0E1'];
    for (let i=0;i<50;i++) {
      const c=document.createElement('div'); c.className='confetti';
      c.style.left=Math.random()*100+'vw'; c.style.background=colors[Math.floor(Math.random()*colors.length)];
      c.style.setProperty('--dur',(2+Math.random()*2)+'s');
      c.style.width=(6+Math.random()*8)+'px'; c.style.height=(6+Math.random()*8)+'px';
      c.style.animationDelay=(Math.random()*0.8)+'s';
      document.body.appendChild(c); c.addEventListener('animationend',()=>c.remove());
    }
  }
  function playCelebSound() {
    try { const ctx=new(window.AudioContext||window.webkitAudioContext)();
      [523,659,784,1047].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.12,ctx.currentTime+i*0.15);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.4);o.start(ctx.currentTime+i*0.15);o.stop(ctx.currentTime+i*0.15+0.4);});
    } catch(e){}
  }

  // === PIN ===
  function showPin(cb) {
    pinBuffer=''; showScreen('pin-screen'); updatePinDots();
    const keys=document.getElementById('pinKeys'); keys.innerHTML='';
    [1,2,3,4,5,6,7,8,9].forEach(n=>{const b=document.createElement('button');b.className='pin-key';b.textContent=n;b.addEventListener('click',()=>pinInput(String(n),cb));keys.appendChild(b);});
    const cancel=document.createElement('button');cancel.className='pin-key cancel';cancel.textContent='もどる';cancel.addEventListener('click',()=>showScreen('kid-screen'));keys.appendChild(cancel);
    const zero=document.createElement('button');zero.className='pin-key';zero.textContent='0';zero.addEventListener('click',()=>pinInput('0',cb));keys.appendChild(zero);
    const del=document.createElement('button');del.className='pin-key del';del.textContent='⌫';del.addEventListener('click',()=>{pinBuffer=pinBuffer.slice(0,-1);updatePinDots();});keys.appendChild(del);
  }
  function pinInput(d,cb) {
    if (pinBuffer.length>=4) return; pinBuffer+=d; updatePinDots();
    if (pinBuffer.length===4) {
      if (pinBuffer===pin) cb();
      else { document.querySelectorAll('#pinDots .pin-dot').forEach(d=>d.classList.add('error')); setTimeout(()=>{pinBuffer='';updatePinDots();document.querySelectorAll('#pinDots .pin-dot').forEach(d=>d.classList.remove('error'));},500); }
    }
  }
  function updatePinDots() { document.querySelectorAll('#pinDots .pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<pinBuffer.length)); }

  // === Parent Mode ===
  function showParent() { showScreen('parent-screen'); renderParentTab(); }
  function renderParentTab() {
    document.querySelectorAll('.parent-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===currentTab));
    const body=document.getElementById('parentBody'); body.innerHTML='';
    if (currentTab==='manage') renderManage(body);
    else if (currentTab==='history') renderHistory(body);
    else if (currentTab==='settings') renderSettings(body);
  }

  // === Manage ===
  function renderManage(body) {
    const sorted=[...items].sort((a,b)=>a.order-b.order);
    sorted.forEach((item,i)=>{
      const row=document.createElement('div'); row.className='manage-item';
      if (item.photo) row.innerHTML='<img class="m-photo" src="'+item.photo+'">';
      else row.innerHTML='<span class="m-icon">'+item.emoji+'</span>';
      const info=document.createElement('div'); info.style.cssText='flex:1;min-width:0;';
      info.innerHTML='<div class="m-label">'+item.label+'</div><div class="m-days">'+(item.days||ALL_DAYS).map(d=>DOW_NAMES[d]).join(' ')+'</div>';
      row.appendChild(info);
      if (i>0){const b=document.createElement('button');b.className='m-up';b.textContent='↑';b.addEventListener('click',()=>{swapOrder(item.id,sorted[i-1].id);renderParentTab();});row.appendChild(b);}
      if (i<sorted.length-1){const b=document.createElement('button');b.className='m-down';b.textContent='↓';b.addEventListener('click',()=>{swapOrder(item.id,sorted[i+1].id);renderParentTab();});row.appendChild(b);}
      const eb=document.createElement('button');eb.className='m-edit';eb.textContent='✏️';eb.addEventListener('click',()=>{editingId=item.id;renderParentTab();});row.appendChild(eb);
      const db=document.createElement('button');db.className='m-del';db.textContent='🗑';db.addEventListener('click',()=>{if(!confirm('「'+item.label+'」をけしますか？'))return;items=items.filter(x=>x.id!==item.id);today.checked=today.checked.filter(c=>c!==item.id);saveItems();saveToday();editingId=null;renderParentTab();renderKid();});row.appendChild(db);
      body.appendChild(row);
    });

    if (editingId) {
      const target = editingId==='__new__' ? null : items.find(x=>x.id===editingId);
      if (editingId==='__new__' || target) renderItemForm(body, target);
    } else {
      const addBtn=document.createElement('button');addBtn.className='btn btn-primary';
      addBtn.textContent='＋ あたらしく ついか';
      addBtn.addEventListener('click',()=>{editingId='__new__';renderParentTab();});
      body.appendChild(addBtn);
    }
  }

  function renderItemForm(body, existing) {
    const form=document.createElement('div'); form.className='add-form';
    let selectedEmoji = existing ? existing.emoji : '📦';
    let selectedPhoto = existing ? (existing.photo||'') : '';
    let selectedDays = existing ? (existing.days||ALL_DAYS).slice() : [1,2,3,4,5];

    // Photo upload
    form.innerHTML='<label>📷 しゃしんで ついか (えらべます)</label>';
    const photoArea=document.createElement('div'); photoArea.className='photo-upload';
    const preview=document.createElement('img'); preview.className='preview';
    if (selectedPhoto) { preview.src=selectedPhoto; preview.style.display='block'; }
    const fileInput=document.createElement('input'); fileInput.type='file'; fileInput.accept='image/*'; fileInput.style.display='none';
    const photoBtn=document.createElement('button'); photoBtn.type='button'; photoBtn.textContent='しゃしんをえらぶ';
    photoBtn.addEventListener('click',()=>fileInput.click());
    const clearPhotoBtn=document.createElement('button'); clearPhotoBtn.type='button'; clearPhotoBtn.textContent='けす'; clearPhotoBtn.style.cssText='background:#FFEBEE;color:#D32F2F;';
    if (!selectedPhoto) clearPhotoBtn.style.display='none';
    fileInput.addEventListener('change', e => {
      const file=e.target.files[0]; if (!file) return;
      const reader=new FileReader();
      reader.onload=ev=>{
        // Resize for storage
        const img=new Image(); img.onload=()=>{
          const MAX=200; let w=img.width,h=img.height;
          if(w>h){if(w>MAX){h=h*MAX/w;w=MAX;}}else{if(h>MAX){w=w*MAX/h;h=MAX;}}
          const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          selectedPhoto=canvas.toDataURL('image/jpeg',0.7);
          preview.src=selectedPhoto;preview.style.display='block';clearPhotoBtn.style.display='';
        };img.src=ev.target.result;
      };reader.readAsDataURL(file);
    });
    clearPhotoBtn.addEventListener('click',()=>{selectedPhoto='';preview.style.display='none';clearPhotoBtn.style.display='none';fileInput.value='';});
    photoArea.appendChild(photoBtn); photoArea.appendChild(clearPhotoBtn); photoArea.appendChild(fileInput); photoArea.appendChild(preview);
    form.appendChild(photoArea);

    // Emoji picker
    const elbl=document.createElement('label');elbl.textContent='または アイコンをえらぶ';form.appendChild(elbl);
    const picker=document.createElement('div');picker.className='emoji-picker';
    EMOJI_LIST.forEach(e=>{const b=document.createElement('button');b.type='button';b.className='emoji-pick'+(e===selectedEmoji?' selected':'');b.textContent=e;b.addEventListener('click',()=>{selectedEmoji=e;picker.querySelectorAll('.emoji-pick').forEach(p=>p.classList.toggle('selected',p.textContent===e));});picker.appendChild(b);});
    form.appendChild(picker);

    // Name
    const nlbl=document.createElement('label');nlbl.textContent='なまえ';form.appendChild(nlbl);
    const inp=document.createElement('input');inp.type='text';inp.value=existing?existing.label:'';inp.placeholder='もちものの なまえ';form.appendChild(inp);

    // Days
    const dlbl=document.createElement('label');dlbl.textContent='もっていく ようび';form.appendChild(dlbl);
    const dayPicker=document.createElement('div');dayPicker.className='day-picker';
    DOW_NAMES.forEach((name,i)=>{
      const b=document.createElement('button');b.type='button';b.className='day-pick'+(selectedDays.includes(i)?' active':'');b.textContent=name;
      b.addEventListener('click',()=>{ if(selectedDays.includes(i)) selectedDays=selectedDays.filter(x=>x!==i); else selectedDays.push(i); b.classList.toggle('active',selectedDays.includes(i)); });
      dayPicker.appendChild(b);
    });
    form.appendChild(dayPicker);

    // Save/Cancel
    const saveBtn=document.createElement('button');saveBtn.className='btn btn-primary';saveBtn.textContent=existing?'ほぞん':'ついか';
    saveBtn.addEventListener('click',()=>{
      const label=inp.value.trim(); if(!label){alert('なまえを いれてください');return;}
      if(existing){existing.emoji=selectedEmoji;existing.label=label;existing.photo=selectedPhoto||undefined;existing.days=selectedDays.sort();}
      else{const mx=items.reduce((m,x)=>Math.max(m,x.order),-1);items.push({id:uid(),emoji:selectedEmoji,label,order:mx+1,photo:selectedPhoto||undefined,days:selectedDays.sort()});}
      editingId=null;saveItems();renderParentTab();renderKid();
    });
    form.appendChild(saveBtn);
    const cancelBtn=document.createElement('button');cancelBtn.className='btn btn-secondary';cancelBtn.textContent='キャンセル';
    cancelBtn.addEventListener('click',()=>{editingId=null;renderParentTab();});
    form.appendChild(cancelBtn);
    body.appendChild(form);
    setTimeout(()=>form.scrollIntoView({behavior:'smooth',block:'start'}),100);
  }

  function swapOrder(a,b) { const x=items.find(i=>i.id===a),y=items.find(i=>i.id===b); if(x&&y){const t=x.order;x.order=y.order;y.order=t;saveItems();} }

  // === History ===
  function renderHistory(body) {
    if(!calMonth){const t=new Date();calMonth=new Date(t.getFullYear(),t.getMonth(),1);}
    const streak=calcStreak();
    if(streak>0){const s=document.createElement('div');s.className='streak-box';s.textContent='🔥 れんぞく '+streak+'にち かんぺき！';body.appendChild(s);}
    const nav=document.createElement('div');nav.className='cal-nav';
    nav.innerHTML='<button id="hPrev">◀</button><div class="cal-title">'+calMonth.getFullYear()+'ねん '+(calMonth.getMonth()+1)+'がつ</div><button id="hNext">▶</button>';
    body.appendChild(nav);
    const grid=document.createElement('div');grid.className='cal-grid';
    DOW_NAMES.forEach(d=>{const c=document.createElement('div');c.className='cal-dow';c.textContent=d;grid.appendChild(c);});
    const first=new Date(calMonth.getFullYear(),calMonth.getMonth(),1);
    const daysIn=new Date(calMonth.getFullYear(),calMonth.getMonth()+1,0).getDate();
    const off=first.getDay();const tk=todayStr();
    for(let i=0;i<off;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
    for(let d=1;d<=daysIn;d++){
      const cell=document.createElement('div');cell.className='cal-day';
      const ds=calMonth.getFullYear()+'-'+String(calMonth.getMonth()+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      if(ds===tk)cell.classList.add('today');
      const active=todayItems();
      const rec=ds===today.date?{total:active.length,completed:today.checked.filter(id=>active.some(it=>it.id===id)).length,allDone:today.checked.filter(id=>active.some(it=>it.id===id)).length>=active.length}:history.find(h=>h.date===ds);
      if(rec)cell.classList.add(rec.allDone?'perfect':(rec.completed>0?'partial':''));
      cell.innerHTML='<span class="daynum">'+d+'</span>'+(rec?'<span class="daycount">'+rec.completed+'/'+rec.total+'</span>':'');
      grid.appendChild(cell);
    }
    body.appendChild(grid);
    const stats=document.createElement('div');stats.style.cssText='margin-top:14px;background:#fff;border-radius:12px;border:1px solid #eee;padding:14px;';
    const r7=getRecentDays(7),r30=getRecentDays(30);
    stats.innerHTML='<div style="font-size:13px;color:#999;margin-bottom:8px;">📊 たっせいりつ</div><div style="display:flex;gap:12px;"><div style="flex:1;text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--accent);">'+Math.round(r7.rate)+'%</div><div style="font-size:11px;color:#999;">7にち</div></div><div style="flex:1;text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--accent2);">'+Math.round(r30.rate)+'%</div><div style="font-size:11px;color:#999;">30にち</div></div></div>';
    body.appendChild(stats);
    document.getElementById('hPrev').addEventListener('click',()=>{calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()-1,1);renderParentTab();});
    document.getElementById('hNext').addEventListener('click',()=>{calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+1,1);renderParentTab();});
  }
  function calcStreak(){let s=0;const d=new Date();const a=todayItems();if(today.checked.filter(id=>a.some(it=>it.id===id)).length>=a.length&&a.length>0){s++;d.setDate(d.getDate()-1);}while(true){const ds=d.toLocaleDateString('sv-SE');const r=history.find(h=>h.date===ds);if(r&&r.allDone){s++;d.setDate(d.getDate()-1);}else break;}return s;}
  function getRecentDays(n){let p=0,t=0;const d=new Date();for(let i=0;i<n;i++){const ds=d.toLocaleDateString('sv-SE');const a=todayItems();const r=ds===today.date?{allDone:today.checked.filter(id=>a.some(it=>it.id===id)).length>=a.length&&a.length>0}:history.find(h=>h.date===ds);if(r){t++;if(r.allDone)p++;}d.setDate(d.getDate()-1);}return{rate:t?(p/t*100):0};}

  // === Settings ===
  function renderSettings(body) {
    body.innerHTML='<div class="setting-group"><div class="setting-row"><label>👧 おなまえ</label><input type="text" id="sName" value="'+settings.childName+'" placeholder="おなまえ"></div></div><div class="setting-group"><div class="setting-row"><label>🔑 パスワード (4けた)</label><input type="password" id="sPin" maxlength="4" inputmode="numeric" value="'+pin+'" placeholder="1234"></div></div><button class="btn btn-primary" id="sSave">ほぞん</button><button class="btn btn-danger" id="sReset">すべてのデータをリセット</button>';
    document.getElementById('sSave').addEventListener('click',()=>{settings.childName=document.getElementById('sName').value.trim();const np=document.getElementById('sPin').value.trim();if(np.length===4&&/^\d{4}$/.test(np))pin=np;else if(np.length>0){alert('パスワードは すうじ4けたで いれてください');return;}saveSettings();savePin();alert('ほぞんしました！');renderKid();});
    document.getElementById('sReset').addEventListener('click',()=>{if(!confirm('ぜんぶのデータを けしますか？'))return;if(!confirm('ほんとうに いいですか？'))return;Object.values(KEYS).forEach(k=>localStorage.removeItem(k));location.reload();});
  }

  // === Events ===
  document.getElementById('parentLink').addEventListener('click',()=>showPin(showParent));
  document.getElementById('parentBack').addEventListener('click',()=>{editingId=null;showScreen('kid-screen');renderKid();});
  document.querySelectorAll('.parent-tab').forEach(t=>t.addEventListener('click',()=>{currentTab=t.dataset.tab;editingId=null;renderParentTab();}));

  // === Init ===
  load(); dailyReset(); renderDateWeather(null); renderKid();
  fetchWeather().then(w=>{if(w)renderDateWeather(w);});
})();
</script>
</body>
</html>
